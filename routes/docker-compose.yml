version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: fundsflow-db
    environment:
      POSTGRES_USER: fundsflow
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fundsflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: